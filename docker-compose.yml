version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./capitalos.db
      SECRET_KEY: capital-os-dev-secret-key-2026
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRUELAYER_CLIENT_ID: ${TRUELAYER_CLIENT_ID:-}
      TRUELAYER_CLIENT_SECRET: ${TRUELAYER_CLIENT_SECRET:-}
      TRUELAYER_REDIRECT_URI: http://localhost:8000/banks/callback
      TRUELAYER_ENV: sandbox
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5